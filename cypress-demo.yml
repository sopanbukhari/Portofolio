name: Cypress Remote Demo
on: 
  workflow_dispatch: # Memungkinkan trigger manual via API

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          command: npx cypress run --spec "login.cy.js"

      - name: Upload Video
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos
          path: cypress/videos